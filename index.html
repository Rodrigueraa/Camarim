<!--
  index.html
  -----------------------------------------------------------------------------
  Página HTML raiz servida pelo Vite. É basicamente uma "casca" vazia:
  o React vai injetar toda a interface dentro da <div id="root">.
  O <script type="module" src="/src/main.jsx"> é o que carrega e
  executa o JavaScript da aplicação (ver main.jsx).
-->
<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Camarim Veste</title>
  </head>
  <body>
    <!-- É aqui que o React "monta" toda a aplicação -->
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
