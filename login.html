<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CamarimVeste</title>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="img/flamengo.png" type="image/x-icon">
</head>
<!-- Class pagina-login para ser puxado la no CSS-->
<body class="pagina-login">

  <main class="login-card">
    <h1>Bem-vindo!</h1>
    <p class="subtitle">Entre com sua conta</p>

    <form action="#" method="post">

        <div class="field">
            <label for="user">Usuário</label>
            <input type="text" id="user" name="user" placeholder="Digite seu usuário" required>
        </div>

        <div class="field">
            <label for="password">Senha</label>
            <input type="password" id="password" name="password" placeholder="Digite a senha" required>
        </div>

        <div class="options">
            <a href="recuperar-senha.html" class="forgot">Esqueceu a senha?</a>
        </div>

      <button type="button" class="button-secondary" onclick="window.location.href='index.html'">Entrar no painel</button>
    </form>

    <p class="signup">Não tem uma conta? <a href="cadastro.html">Cadastre-se</a></p>
  </main>

</body>
</html>
